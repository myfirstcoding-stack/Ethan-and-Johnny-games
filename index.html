<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Center</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .game-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .game {
            background-color: #ffffff;
            border: 2px solid #007bff;
            border-radius: 8px;
            padding: 20px;
            width: 30%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin: 10px;
            transition: transform 0.2s;
        }
        .game:hover {
            transform: scale(1.05);
        }
        .game-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #007bff;
        }
        .play-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
        }
        .play-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Game Center</h1>
    <div class="game-container">
        <div class="game">
            <div class="game-title">Tic-Tac-Toe</div>
            <button class="play-button" onclick="location.href='tic-tac-toe.html'">Play Now</button>
        </div>
        <div class="game">
            <div class="game-title">Rock-Paper-Scissors</div>
            <button class="play-button" onclick="location.href='rock-paper-scissors.html'">Play Now</button>
        </div>
        <div class="game">
            <div class="game-title">Memory Game</div>
            <button class="play-button" onclick="location.href='memory-game.html'">Play Now</button>
        </div>
    </div>
</body>
</html>
